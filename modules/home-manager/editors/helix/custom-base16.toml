# Custom overrides on top of base16_transparent + scheme palette
# Hot-reloadable: edit this file and run :config-reload in helix
inherits = "base16-nix"

# Italic comments (standard base16_transparent has plain color only)
"comment" = { fg = "base04", modifiers = ["italic"] }

# Explicit line number color
"ui.linenr" = { fg = "base03", modifiers = ["dim"] }

# Granular syntax scopes (not in standard base16_transparent)
"variable.builtin" = { fg = "base0E" }
"variable.parameter" = { fg = "base08" }
"constant.builtin" = { fg = "base09" }
"string.regexp" = { fg = "base0C" }
"number" = { fg = "base09" }
"boolean" = { fg = "base09" }
"keyword.control" = { fg = "base0E" }
"keyword.operator" = { fg = "base05" }
"operator" = { fg = "base05" }
"function.builtin" = { fg = "base0D" }
"function.method" = { fg = "base0D" }
"function.macro" = { fg = "base0D" }
"type.builtin" = { fg = "base0A" }
"property" = { fg = "base0C" }
"module" = { fg = "base0D" }
"tag" = { fg = "base08" }
"punctuation" = { fg = "base05" }
"punctuation.bracket" = { fg = "base05" }
"punctuation.delimiter" = { fg = "base05" }

# Markup overrides
"markup.heading" = { fg = "base0D", modifiers = ["bold"] }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.link.url" = { fg = "base0C" }
"markup.link.text" = { fg = "base0D" }
