<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mediaPi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      padding: 2rem;
      max-width: 900px;
    }
    a.tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2.5rem 2rem;
      border-radius: 1rem;
      text-decoration: none;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
      min-width: 200px;
    }
    a.tile:hover, a.tile:focus {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,255,255,0.1);
    }
    a.tile svg { width: 48px; height: 48px; fill: currentColor; }

    .netflix   { background: #b20710; }
    .youtube   { background: #c4302b; }
    .twitch    { background: #6441a5; }
    .disney    { background: #113ccf; }
    .spotify   { background: #1db954; }
  </style>
</head>
<body>
  <div class="grid">
    <a class="tile netflix" href="https://www.netflix.com">
      <svg viewBox="0 0 24 24"><path d="M5.398 0v24l6.735-2.265V0H5.398zm6.867 0v21.735L18.602 24V0h-6.337z"/></svg>
      Netflix
    </a>
    <a class="tile youtube" href="https://www.youtube.com">
      <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 00.5 6.2 31.9 31.9 0 000 12a31.9 31.9 0 00.5 5.8 3 3 0 002.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 002.1-2.1A31.9 31.9 0 0024 12a31.9 31.9 0 00-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
      YouTube
    </a>
    <a class="tile twitch" href="https://www.twitch.tv">
      <svg viewBox="0 0 24 24"><path d="M2.1 0L.5 4.2v16.6h5.8V24h3.5l3.5-3.2h5.2L24 15.5V0H2.1zm19.5 14.4l-3.8 3.8h-5.8l-3.5 3.2v-3.2H4V2.4h17.6v12z"/><path d="M10.4 6.8h2.4v7h-2.4zm6.4 0h2.4v7h-2.4z"/></svg>
      Twitch
    </a>
    <a class="tile disney" href="https://www.disneyplus.com">
      <svg viewBox="0 0 24 24"><path d="M2 12C2 6.5 6.5 2 12 2s10 4.5 10 10-4.5 10-10 10S2 17.5 2 12zm10-7a1 1 0 00-1 1v5.6L7.4 8a1 1 0 00-1.4 1.4L9.6 13 6 16.6a1 1 0 001.4 1.4L11 14.4V18a1 1 0 002 0v-3.6l3.6 3.6a1 1 0 001.4-1.4L14.4 13 18 9.4A1 1 0 0016.6 8L13 11.6V6a1 1 0 00-1-1z"/></svg>
      Disney+
    </a>
    <a class="tile spotify" href="https://open.spotify.com">
      <svg viewBox="0 0 24 24"><path d="M12 0a12 12 0 100 24 12 12 0 000-24zm5.5 17.3a.75.75 0 01-1 .25c-2.8-1.7-6.3-2.1-10.4-1.1a.75.75 0 11-.3-1.5c4.5-1 8.4-.6 11.5 1.3a.75.75 0 01.2 1.05zm1.5-3.3a.94.94 0 01-1.3.3c-3.2-2-8.1-2.5-11.9-1.4a.94.94 0 11-.5-1.8c4.3-1.3 9.7-.7 13.4 1.6a.94.94 0 01.3 1.3zm.1-3.4c-3.8-2.3-10.2-2.5-13.8-1.4a1.13 1.13 0 11-.7-2.1c4.2-1.3 11.1-1 15.5 1.6a1.13 1.13 0 01-1 2z"/></svg>
      Spotify
    </a>
  </div>
</body>
</html>
